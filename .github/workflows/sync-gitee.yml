name: Sync to Gitee

on:
  push:
    branches: [main]
  create:
    tags: ['v*']

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        run: |
          git remote add gitee https://${{ secrets.GITEE_USER }}:${{ secrets.GITEE_TOKEN }}@gitee.com/palmmedia/trae.git || true
          git push gitee main --force
          git push gitee --tags --force
